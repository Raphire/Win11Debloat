name: Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pester:
    name: Pester (Windows PowerShell 5.1)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run tests
        shell: powershell
        run: ./Scripts/Run-Tests.ps1 -Bootstrap
